# Bukhari Sales — HTTP only (pre-SSL)
server {
    listen 80;
    server_name sales.gonzo.ink;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 200 'Bukhari Sales - Setting up SSL...';
        add_header Content-Type text/plain;
    }
}
